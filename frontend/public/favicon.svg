<svg width="520" height="180" viewBox="0 0 520 180" xmlns="http://www.w3.org/2000/svg">      
      
  <!-- Gradient -->      
      
  <defs>      
      
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">      
      
      <stop offset="0%" stop-color="#5A0FC8"/>      
      
      <stop offset="100%" stop-color="#2E005F"/>      
      
    </linearGradient>      
      
  </defs>      
      
  <!-- Icon Background -->      
      
  <rect x="20" y="30" width="120" height="120" rx="32" fill="url(#gradPurple)"/>      
      
  <!-- Stylized K -->      
      
  <path d="M60 60 V120       
      
           M60 90 L105 60       
      
           M60 90 L105 120"      
      
        stroke="#FFFFFF"      
      
        stroke-width="10"      
      
        stroke-linecap="round"      
      
        stroke-linejoin="round"/>      
      
  <!-- Connection Lines (subtle hub feel) -->      
      
  <line x1="105" y1="60" x2="120" y2="85" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>      
      
  <line x1="105" y1="120" x2="120" y2="95" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>      
      
  <!-- Hub Nodes -->      
      
  <circle cx="120" cy="85" r="7" fill="#FFFFFF"/>      
      
  <circle cx="105" cy="60" r="5" fill="#FFFFFF"/>      
      
  <circle cx="105" cy="120" r="5" fill="#FFFFFF"/>      
      
  <text x="160" y="95"      
      
        font-family="system-ui, -apple-system, sans-serif"      
      
        font-size="62"      
      
        font-weight="800"      
      
        fill="#2E005F"      
      
        letter-spacing="-1.5">      
      
        Khub      
      
  </text>      
      
<text x="162" y="125"      
      
        font-family="system-ui, -apple-system, sans-serif"      
      
        font-size="14"      
      
        font-weight="500"      
      
        fill="#5A4A7A"      
      
        letter-spacing="2">      
      
        YOUR NO. 1 BUSINESS HUB      
      
  </text>      
      
</svg> 
